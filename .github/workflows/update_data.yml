name: Update Legal Dong Data

on:
  schedule:
    - cron: '0 * * * *' # 매시간 정각 실행
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl requests scrapling curl-cffi playwright

      - name: Run update script
        run: python update_legal_dong.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dong.json token.json
          git commit -m "chore: update regional data and token $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push
